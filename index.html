
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MITS CCMS - Club Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#0099FF',
              'primary-hover': '#007ACC',
              navy: {
                50: '#F0F4FD',
                100: '#E0E7FF',
                700: '#1B2559',
                800: '#111C44',
                900: '#02040a',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        /* MITS Brand Colors */
        --primary: #0099FF;
        --primary-hover: #007ACC;
        
        /* Light Mode System (Horizon UI Style) */
        --bg-main: #F4F7FE;     
        --bg-surface: #FFFFFF;
        
        --text-main: #1B2559; /* Navy Blue for high contrast text */
        --text-secondary: #A3AED0;
        
        --border-color: #E2E8F0;
        --card-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
      }

      html.dark {
        /* Dark Mode System */
        --bg-main: #02040a;
        --bg-surface: #111C44;
        
        --text-main: #FFFFFF;
        --text-secondary: #A3AED0;
        
        --border-color: rgba(255, 255, 255, 0.05);
        --card-shadow: 0px 40px 80px rgba(0, 0, 0, 0.2);
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        overflow-x: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: 'DM Sans', sans-serif;
        letter-spacing: -0.02em;
      }

      .font-serif-display {
        font-family: 'Playfair Display', serif;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #A3AED0; 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary); 
      }
      
      .mits-shadow {
        box-shadow: var(--card-shadow);
      }
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      html.dark .glass {
        background: rgba(13, 18, 29, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      /* Utilities */
      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "cors": "https://esm.sh/cors@^2.8.6",
    "express": "https://esm.sh/express@^5.2.1",
    "bcryptjs": "https://esm.sh/bcryptjs@^3.0.3",
    "@prisma/client": "https://esm.sh/@prisma/client@^7.3.0",
    "jsonwebtoken": "https://esm.sh/jsonwebtoken@^9.0.3",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.48.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
